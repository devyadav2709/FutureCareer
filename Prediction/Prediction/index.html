<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Career Prediction</title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Future Career Prediction Form</h1>
        <form action="process.php" method="POST" enctype="multipart/form-data" class="p-4 shadow rounded bg-white">
            <!-- Personal Information -->
            <h3>Personal Information</h3>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="fullName" class="form-label">Full Name *</label>
                    <input type="text" class="form-control" id="fullName" name="fullName" required>
                </div>
                <div class="col-md-6">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                </div>
                <div class="col-md-6">
                    <label for="dob" class="form-label">Date of Birth *</label>
                    <input type="date" class="form-control" id="dob" name="dob" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-select" id="gender" name="gender">
                    <option value="" selected disabled>Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="location" class="form-label">Current Location *</label>
                <input type="text" class="form-control" id="location" name="location" required>
            </div>

            <!-- Education Background -->
            <h3>Education Background</h3>
            <div class="mb-3">
                <label for="educationLevel" class="form-label">Highest Education Level *</label>
                <select class="form-select" id="educationLevel" name="educationLevel" required>
                    <option value="" selected disabled>Select</option>
                    <option value="12th Grade/High School">12th Grade/High School</option>
                    <option value="Graduate (Bachelor's Degree)">Graduate (Bachelor's Degree)</option>
                    <option value="Postgraduate (Master's/PhD)">Postgraduate (Master's/PhD)</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="fieldOfStudy" class="form-label">Field of Study *</label>
                <input type="text" class="form-control" id="fieldOfStudy" name="fieldOfStudy" required>
            </div>
            <div class="mb-3">
                <label for="institution" class="form-label">Institution</label>
                <input type="text" class="form-control" id="institution" name="institution">
            </div>
            <div class="mb-3">
                <label for="yearOfPassing" class="form-label">Year of Passing *</label>
                <input type="number" class="form-control" id="yearOfPassing" name="yearOfPassing" required>
            </div>

            <!-- Skills & Interests -->
            <h3>Skills & Interests</h3>
            <div class="mb-3">
                <label for="mainField" class="form-label">Main Academic/Professional Field *</label>
                <select class="form-select" id="mainField" name="mainField" onchange="populateDomains()" required>
                    <option value="" selected disabled>Select Main Field</option>
                    <option value="engineering">Engineering & Technology</option>
                    <option value="science">Science</option>
                    <option value="commerce">Commerce & Management</option>
                    <option value="medical">Medical & Health Sciences</option>
                    <option value="computer">Computer & IT</option>
                    <option value="design">Design & Creative Arts</option>
                    <option value="education">Education & Teaching</option>
                    <option value="law">Law</option>
                    <option value="agriculture">Agriculture & Environment</option>
                    <option value="hospitality">Travel, Tourism & Hospitality</option>
                    <option value="vocational">Vocational / Skill-Based</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="domain" class="form-label">Specific Domain *</label>
                <select class="form-select" id="domain" name="domain" onchange="populateSkills()" required>
                    <option value="" selected disabled>Select Domain</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="skillsBox" class="form-label">Technical Skills *</label>
                <select class="form-select" id="skillsBox" name="technicalSkills" required>
                    <option value="" selected disabled>Select your primary technical skill</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="softSkills" class="form-label">Soft Skills</label>
                <input type="text" class="form-control" id="softSkills" name="softSkills" placeholder="e.g., Communication, Teamwork">
            </div>
            <div class="mb-3">
                <label for="hobbies" class="form-label">Hobbies / Interests *</label>
                <input type="text" class="form-control" id="hobbies" name="hobbies" required>
            </div>

            <!-- Career Preferences -->
            <h3>Career Preferences</h3>
            <div class="mb-3">
                <label for="industry" class="form-label">Preferred Industry *</label>
                <input type="text" class="form-control" id="industry" name="industry" required>
            </div>
            <div class="mb-3">
                <label for="workPreference" class="form-label">Work Preference</label>
                <select class="form-select" id="workPreference" name="workPreference">
                    <option value="" selected disabled>Select</option>
                    <option value="Remote">Remote</option>
                    <option value="On-site">On-site</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="futureGoal" class="form-label">Future Goal *</label>
                <input type="text" class="form-control" id="futureGoal" name="futureGoal" required>
            </div>

            <!-- Additional Information -->
            <h3>Additional Information</h3>
            <div class="mb-3">
                <label for="resume" class="form-label">Upload Resume (PDF/DOC)</label>
                <input type="file" class="form-control" id="resume" name="resume" accept=".pdf,.doc,.docx">
            </div>
            <div class="mb-3">
                <label for="linkedin" class="form-label">LinkedIn / GitHub URL</label>
                <input type="url" class="form-control" id="linkedin" name="linkedin">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message / Notes</label>
                <textarea class="form-control" id="message" name="message" rows="4"></textarea>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="agreement" name="agreement" required>
                <label class="form-check-label" for="agreement">I agree to data usage for career prediction and analysis. *</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Form</button>
        </form>
    </div>
    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
